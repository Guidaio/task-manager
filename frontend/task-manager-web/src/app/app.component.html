<header class="top">
  <div class="brand">
    <a routerLink="/tasks" class="logo">Task Manager</a>
  </div>
  <nav class="nav">
    @if (tokenStore.token()) {
      <span class="user">{{ tokenStore.auth()?.name }}</span>
      <a routerLink="/tasks">Tasks</a>
      <button type="button" class="ghost" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login">Login</a>
      <a routerLink="/register" class="button primary">Register</a>
    }
  </nav>
</header>

<main class="main">
  <router-outlet />
</main>

<div class="toast-stack" aria-live="polite" aria-atomic="false">
  @for (t of realtime.toasts(); track t.id) {
    <div class="toast" [class.toast-success]="t.type === 'success'" [class.toast-warning]="t.type === 'warning'" [class.toast-info]="t.type === 'info'">
      <button type="button" class="toast-close" (click)="realtime.dismiss(t.id)" aria-label="Dismiss">×</button>
      <p>{{ t.message }}</p>
    </div>
  }
</div>
